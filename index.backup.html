<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>介護日報 テンプレートコピー</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Meiryo", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px 60px;
    }
    .container { width: 100%; max-width: 400px; }

    h1 { font-size: 17px; font-weight: 700; color: #1e293b; margin-bottom: 20px; letter-spacing: .05em; }

    /* ステップカード */
    .step-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      padding: 16px;
      margin-bottom: 12px;
    }
    .step-card.disabled { opacity: .35; pointer-events: none; }

    .step-title {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .1em;
      color: #94a3b8;
      margin-bottom: 12px;
    }

    /* ボタングループ */
    .btn-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    /* 時間帯ボタン */
    .time-btn {
      flex: 1;
      padding: 16px 6px;
      font-family: inherit;
      font-size: 18px;
      font-weight: 700;
      color: #475569;
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: .06em;
      transition: all .15s;
    }
    .time-btn:hover { background: #fef3c7; border-color: #fbbf24; color: #92400e; }
    .time-btn.active { background: #f59e0b; border-color: #f59e0b; color: #fff; box-shadow: 0 2px 8px rgba(245,158,11,.4); }

    /* サービスボタン */
    .svc-btn {
      flex: 1;
      min-width: calc(33.33% - 6px);
      padding: 16px 4px;
      font-family: inherit;
      font-size: 17px;
      font-weight: 700;
      color: #475569;
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      cursor: pointer;
      letter-spacing: .04em;
      transition: all .15s;
    }
    .svc-btn:hover { background: #ede9fe; border-color: #a78bfa; color: #5b21b6; }
    .svc-btn.active { background: #7c3aed; border-color: #7c3aed; color: #fff; box-shadow: 0 2px 8px rgba(124,58,237,.35); }

    /* 入浴ボタン */
    .bath-btn {
      flex: 1;
      padding: 18px 8px;
      font-family: inherit;
      font-size: 17px;
      font-weight: 700;
      border-radius: 10px;
      border: 2px solid;
      cursor: pointer;
      letter-spacing: .04em;
      transition: all .15s;
    }
    .bath-btn.yes { color: #0369a1; background: #f0f9ff; border-color: #bae6fd; }
    .bath-btn.yes:hover { background: #e0f2fe; border-color: #38bdf8; }
    .bath-btn.yes.active { background: #0284c7; border-color: #0284c7; color: #fff; box-shadow: 0 2px 8px rgba(2,132,199,.35); }

    .bath-btn.no { color: #15803d; background: #f0fdf4; border-color: #bbf7d0; }
    .bath-btn.no:hover { background: #dcfce7; border-color: #4ade80; }
    .bath-btn.no.active { background: #16a34a; border-color: #16a34a; color: #fff; box-shadow: 0 2px 8px rgba(22,163,74,.35); }

    /* プレビュー */
    .preview-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      padding: 16px 18px;
      min-height: 80px;
      position: relative;
      transition: box-shadow .2s;
    }
    .preview-card.ok { box-shadow: 0 0 0 2px #10b981, 0 2px 10px rgba(16,185,129,.15); }
    .preview-placeholder { font-size: 13px; color: #cbd5e1; line-height: 1.7; }
    #preview-text { display: none; font-size: 14px; line-height: 1.9; color: #1e293b; padding-right: 4px; }
    .copied-badge {
      display: none;
      position: absolute;
      top: 12px; right: 14px;
      font-size: 11px; font-weight: 700;
      color: #10b981; letter-spacing: .04em;
      background: #fff;
      padding: 2px 6px;
      border-radius: 6px;
      box-shadow: 0 0 0 1px #d1fae5;
    }
    .preview-card.ok .copied-badge { display: block; }

    /* トースト */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(14px);
      background: #1e293b; color: #fff;
      padding: 10px 24px; border-radius: 24px;
      font-size: 13px; font-weight: 700;
      opacity: 0; transition: opacity .2s, transform .2s;
      pointer-events: none; white-space: nowrap; z-index: 100;
      letter-spacing: .04em;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.err  { background: #dc2626; }

    /* フォールバック */
    .fallback {
      display: none; margin-top: 12px; padding: 12px 14px;
      background: #fffbeb; border: 1px solid #fcd34d;
      border-radius: 12px; font-size: 12px; color: #92400e;
    }
    .fallback strong { display: block; margin-bottom: 6px; }
    #fallback-text {
      background: #fff; border: 1px solid #e5e7eb; border-radius: 8px;
      padding: 8px 10px; font-size: 12px; color: #333;
      word-break: break-all; user-select: all; line-height: 1.7;
    }
  </style>
</head>

<div class="container">

  <!-- STEP 1: 時間帯 -->

    <div class="step-title">① 時間帯</div>

  </div>

  <!-- STEP 2: サービス -->

    <div class="btn-group" id="svc-btns"></div>
  </div>

  <!-- STEP 3: 入浴（身系のみ表示） -->
  <div class="step-card disabled" id="step3" style="display:none">
    <div class="step-title">③ 入浴</div>
    <div class="btn-group">
      <button class="bath-btn yes" id="bath-yes">入浴あり</button>
      <button class="bath-btn no"  id="bath-no">入浴なし</button>
    </div>
  </div>

  <!-- プレビュー -->

    <div id="preview-text"></div>
    <div class="copied-badge">✓ コピーしました</div>
  </div>

  <div class="fallback" id="fallback">

    <div id="fallback-text"></div>
  </div>
</div>

// ボタン構成
const times    = ["朝", "昼", "夜"];
const services = ["身１", "身２", "家１", "家２", "生１", "生２"];
const svcNeedsBath = (svc) => svc.startsWith("身");
// ========================================

let sel = { time: null, svc: null };
let toastTimer = null;
const lastPicked = {};

function pickRandom(arr, key) {
  if (arr.length === 1) return arr[0];
  const prev = lastPicked[key];
  const candidates = arr.filter(t => t !== prev);
  const chosen = candidates[Math.floor(Math.random() * candidates.length)];
  lastPicked[key] = chosen;
  return chosen;
}

function showToast(msg, isErr) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "show" + (isErr ? " err" : "");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ""; }, 2000);
}

function showPreview(text, ok) {
  const p  = document.getElementById("preview");
  const pt = document.getElementById("preview-text");
  p.querySelector(".preview-placeholder").style.display = "none";
  pt.style.display = "block";
  pt.textContent = text;
  p.className = "preview-card" + (ok ? " ok" : "");
  if (ok) setTimeout(() => p.classList.remove("ok"), 2200);
}

function doCopy(key) {
  const list = templates[key];
  if (!list || list.length === 0) {
    showToast("テンプレートがありません", true);
    return;
  }
  const text = pickRandom(list, key);
  if (!navigator.clipboard) {
    showPreview(text, false);
    document.getElementById("fallback").style.display = "block";
    document.getElementById("fallback-text").textContent = text;
    showToast("手動でコピーしてください", true);
    return;
  }
  navigator.clipboard.writeText(text).then(() => {
    showPreview(text, true);
    document.getElementById("fallback").style.display = "none";
    showToast("コピーしました ✓");
  }).catch(() => {
    showPreview(text, false);
    document.getElementById("fallback").style.display = "block";
    document.getElementById("fallback-text").textContent = text;
    showToast("手動でコピーしてください", true);
  });
}

function setActive(group, btn) {
  group.querySelectorAll("button").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
}

// ── Step 1: 時間帯 ──
const timeBtns = document.getElementById("time-btns");
times.forEach(t => {
  const btn = document.createElement("button");
  btn.className = "time-btn";
  btn.textContent = t;
  btn.addEventListener("click", () => {
    sel.time = t;
    sel.svc  = null;
    setActive(timeBtns, btn);
    // step2 enable, step3 hide
    document.getElementById("step2").classList.remove("disabled");
    document.getElementById("step3").style.display = "none";
    document.getElementById("step3").classList.add("disabled");
    document.querySelectorAll(".svc-btn").forEach(b => b.classList.remove("active"));
    document.getElementById("bath-yes").classList.remove("active");
    document.getElementById("bath-no").classList.remove("active");
  });
  timeBtns.appendChild(btn);
});

// ── Step 2: サービス ──
const svcBtns = document.getElementById("svc-btns");
services.forEach(svc => {
  const btn = document.createElement("button");
  btn.className = "svc-btn";
  btn.textContent = svc;
  btn.addEventListener("click", () => {
    if (!sel.time) return;
    sel.svc = svc;
    setActive(svcBtns, btn);

    if (svcNeedsBath(svc)) {
      // 身系 → step3 表示
      const s3 = document.getElementById("step3");
      s3.style.display = "block";
      s3.classList.remove("disabled");
      document.getElementById("bath-yes").classList.remove("active");
      document.getElementById("bath-no").classList.remove("active");
    } else {
      // 家系/生系 → 即コピー
      document.getElementById("step3").style.display = "none";
      doCopy(`${svc}_${sel.time}`);
    }
  });
  svcBtns.appendChild(btn);
});

// ── Step 3: 入浴 ──
document.getElementById("bath-yes").addEventListener("click", function() {
  if (!sel.time || !sel.svc) return;
  setActive(document.querySelector(".btn-group:last-of-type"), this);
  doCopy(`${sel.svc}_${sel.time}_入浴`);
});
document.getElementById("bath-no").addEventListener("click", function() {
  if (!sel.time || !sel.svc) return;
  setActive(document.querySelector(".btn-group:last-of-type"), this);
  doCopy(`${sel.svc}_${sel.time}_通常`);
});
</script>
